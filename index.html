<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPND TEST — проверка подключения</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #30363d;
            text-align: center;
        }
        h1 {
            color: #58a6ff;
            font-size: 32px;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #8b949e;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: 0.3s;
            background: #238636;
            color: white;
            width: 100%;
        }
        .btn:hover { background: #2ea043; }
        .btn:active { transform: scale(0.97); }
        .btn-secondary {
            background: #21262d;
            margin-top: 10px;
        }
        .btn-secondary:hover { background: #30363d; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #0d1117;
            border-radius: 10px;
            border: 1px solid #30363d;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            color: #f0883e;
            min-height: 50px;
            display: none;
        }
        .result-box.show { display: block; }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #1c3a2a; color: #3fb950; border: 1px solid #238636; }
        .status.error { background: #3a1c1c; color: #f85149; border: 1px solid #da3633; }
        .copy-btn {
            background: #21262d;
            border: none;
            color: #8b949e;
            padding: 4px 14px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
        }
        .copy-btn:hover { background: #30363d; color: white; }
        .footer {
            margin-top: 25px;
            color: #8b949e;
            font-size: 12px;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }
        .test-script {
            background: #0d1117;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #8b949e;
            text-align: left;
            margin-top: 15px;
            display: none;
        }
        .test-script.show { display: block; }
        .test-script code { color: #58a6ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 UPND TEST</h1>
        <p class="subtitle">Проверка подключения между сайтом и Roblox</p>

        <button class="btn" onclick="generateTestLink()">🎲 Сгенерировать тестовую ссылку</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ Очистить</button>

        <div class="result-box" id="resultBox">
            <div id="resultLink"></div>
            <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>
        </div>

        <div class="test-script" id="testScript">
            <strong>📌 Тестовый скрипт для Roblox:</strong><br>
            <code id="testCode">-- Тестовый скрипт</code>
        </div>

        <div class="status" id="status"></div>

        <div class="footer">
            🔗 Ссылка работает: <span id="linkStatus">⏳ ожидание</span>
        </div>
    </div>

    <script>
        // ================================================
        // === ТЕСТОВАЯ ЛОГИКА ===
        // ================================================

        const BASE_URL = window.location.href.split('?')[0];
        let currentLink = '';

        // === ГЕНЕРАЦИЯ ТЕСТОВОЙ ССЫЛКИ ===
        function generateTestLink() {
            const id = generateId();
            currentLink = BASE_URL + '?id=' + id;
            
            // Показываем ссылку
            document.getElementById('resultLink').textContent = currentLink;
            document.getElementById('resultBox').classList.add('show');
            
            // Показываем тестовый скрипт
            const testScript = `-- Тестовый скрипт UPND\nprint("✅ Подключение работает!")\nprint("📌 ID: ${id}")\nprint("📌 Время: " .. os.time())`;
            document.getElementById('testCode').textContent = testScript;
            document.getElementById('testScript').classList.add('show');
            
            // Обновляем статус
            document.getElementById('linkStatus').textContent = '✅ создана';
            document.getElementById('linkStatus').style.color = '#3fb950';
            
            showStatus('✅ Тестовая ссылка создана! Вставь её в Roblox', 'success');
        }

        function generateId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < 8; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        // === КОПИРОВАНИЕ ===
        function copyLink() {
            if (currentLink) {
                copyToClipboard(currentLink);
                showStatus('📋 Ссылка скопирована!', 'success');
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
            }
        }

        // === СТАТУС ===
        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status show ' + type;
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }

        function clearAll() {
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('testScript').classList.remove('show');
            document.getElementById('status').classList.remove('show');
            document.getElementById('linkStatus').textContent = '⏳ ожидание';
            document.getElementById('linkStatus').style.color = '#8b949e';
            currentLink = '';
        }

        // === ОБРАБОТКА GET-ЗАПРОСОВ (API для Roblox) ===
        function handleApiRequest() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                // Тестовый скрипт, который возвращается в Roblox
                const testScript = `-- Тестовый скрипт UPND
print("✅ Подключение работает!")
print("📌 ID: ${id}")
print("📌 Время: " .. os.time())
print("📌 Сайт отвечает правильно!")

-- Проверка скорости
local start = tick()
for i = 1, 10 do
    task.wait()
end
print("⏱️ Задержка: " .. (tick() - start) .. " сек")
`;
                document.body.textContent = testScript;
                return true;
            }

            return false;
        }

        // === ЗАПУСК ===
        if (!handleApiRequest()) {
            // Показываем интерфейс
        }

        console.log('✅ UPND TEST загружен!');
        console.log('📌 Нажми кнопку для генерации тестовой ссылки');
        console.log('📌 Вставь ссылку в Roblox и проверь подключение');
    </script>
</body>
</html>
