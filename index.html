<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UPND TEST — генератор ссылок для Roblox</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: #161b22;
            border-radius: 16px;
            padding: 30px;
            border: 1px solid #30363d;
            text-align: center;
        }
        h1 { color: #58a6ff; font-size: 32px; margin-bottom: 5px; }
        .subtitle { color: #8b949e; font-size: 14px; margin-bottom: 25px; }
        .btn {
            padding: 14px 40px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 18px;
            font-weight: 700;
            transition: 0.3s;
            background: #238636;
            color: white;
            width: 100%;
        }
        .btn:hover { background: #2ea043; }
        .btn:active { transform: scale(0.97); }
        .btn-secondary { background: #21262d; margin-top: 10px; }
        .btn-secondary:hover { background: #30363d; }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: #0d1117;
            border-radius: 10px;
            border: 1px solid #30363d;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #f0883e;
            min-height: 50px;
            display: none;
            text-align: left;
        }
        .result-box.show { display: block; }
        .result-box .label {
            color: #8b949e;
            font-size: 11px;
            margin-bottom: 5px;
            font-family: 'Segoe UI', sans-serif;
        }
        .result-box .link {
            color: #58a6ff;
            word-break: break-all;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #1c3a2a; color: #3fb950; border: 1px solid #238636; }
        .status.error { background: #3a1c1c; color: #f85149; border: 1px solid #da3633; }
        .copy-btn {
            background: #21262d;
            border: none;
            color: #8b949e;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            margin-top: 8px;
            transition: 0.3s;
        }
        .copy-btn:hover { background: #30363d; color: white; }
        .footer { margin-top: 25px; color: #8b949e; font-size: 12px; border-top: 1px solid #30363d; padding-top: 15px; }
        .test-script {
            background: #0d1117;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #8b949e;
            text-align: left;
            margin-top: 15px;
            display: none;
            max-height: 200px;
            overflow: auto;
        }
        .test-script.show { display: block; }
        .test-script code { color: #58a6ff; }
        .proxy-hint {
            background: #1c1c2e;
            padding: 10px 16px;
            border-radius: 8px;
            border-left: 3px solid #f0883e;
            margin: 15px 0;
            font-size: 13px;
            color: #c9d1d9;
            text-align: left;
        }
        .proxy-hint strong { color: #58a6ff; }
        .two-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .two-btns .btn { width: 50%; padding: 10px; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 UPND TEST</h1>
        <p class="subtitle">Создаёт готовые ссылки для Roblox</p>

        <div class="proxy-hint">
            📌 <strong>Как работает:</strong> Сайт создаёт ссылку с прокси
            <br><code>https://api.allorigins.win/raw?url=ТВОЯ_ССЫЛКА</code>
            <br>→ Вставляешь в Roblox → Работает!
        </div>

        <button class="btn" onclick="generateTestLink()">🎲 Сгенерировать ссылку для Roblox</button>
        <button class="btn btn-secondary" onclick="clearAll()">🗑️ Очистить</button>

        <div class="result-box" id="resultBox">
            <div class="label">📋 Вставь ЭТУ ссылку в Roblox:</div>
            <div class="link" id="resultLink"></div>
            <button class="copy-btn" onclick="copyLink()">📋 Копировать</button>
        </div>

        <div class="test-script" id="testScript">
            <strong>📌 Код для теста в Roblox:</strong><br>
            <code id="testCode">-- Тестовый скрипт</code>
        </div>

        <div class="status" id="status"></div>

        <div class="footer">
            🔗 Ссылка создана: <span id="linkStatus">⏳ ожидание</span>
        </div>
    </div>

    <script>
        // ================================================
        // === ЛОГИКА ===
        // ================================================

        const BASE_URL = window.location.href.split('?')[0];
        const PROXY_URL = "https://api.allorigins.win/raw?url=";
        let currentLink = '';
        let currentProxyLink = '';

        function generateTestLink() {
            const id = generateId();
            currentLink = BASE_URL + '?id=' + id;
            currentProxyLink = PROXY_URL + encodeURIComponent(currentLink);
            
            // Показываем ссылку для Roblox
            document.getElementById('resultLink').textContent = currentProxyLink;
            document.getElementById('resultBox').classList.add('show');
            
            // Тестовый скрипт для Roblox
            const testScript = `-- ✅ UPND TEST
local HttpService = game:GetService("HttpService")

-- Вставь эту ссылку в Roblox
local url = "${currentProxyLink}"

local success, response = pcall(function()
    return HttpService:GetAsync(url, true)
end)

if success then
    print("✅ Подключение работает!")
    print("📌 Ответ сервера:")
    print(response)
    local func = loadstring(response)
    if func then
        func()
        print("✅ Тестовый скрипт выполнен!")
    end
else
    print("❌ Ошибка подключения!")
    warn("Проверь ссылку или интернет")
end`;
            document.getElementById('testCode').textContent = testScript;
            document.getElementById('testScript').classList.add('show');
            
            document.getElementById('linkStatus').textContent = '✅ готова';
            document.getElementById('linkStatus').style.color = '#3fb950';
            
            showStatus('✅ Ссылка создана! Вставь её в Roblox', 'success');
        }

        function generateId() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let id = '';
            for (let i = 0; i < 8; i++) {
                id += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return id;
        }

        function copyLink() {
            if (currentProxyLink) {
                copyToClipboard(currentProxyLink);
                showStatus('📋 Ссылка скопирована! Вставь в Roblox', 'success');
            }
        }

        function copyToClipboard(text) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text);
            } else {
                const ta = document.createElement('textarea');
                ta.value = text;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                ta.remove();
            }
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status show ' + type;
            setTimeout(() => {
                el.classList.remove('show');
            }, 5000);
        }

        function clearAll() {
            document.getElementById('resultBox').classList.remove('show');
            document.getElementById('testScript').classList.remove('show');
            document.getElementById('status').classList.remove('show');
            document.getElementById('linkStatus').textContent = '⏳ ожидание';
            document.getElementById('linkStatus').style.color = '#8b949e';
            currentLink = '';
            currentProxyLink = '';
        }

        // === ОБРАБОТКА GET-ЗАПРОСОВ (API для Roblox) ===
        function handleApiRequest() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');

            if (id) {
                const testScript = `-- Тестовый скрипт UPND
print("✅ Подключение работает!")
print("📌 ID: ${id}")
print("📌 Время: " .. os.time())
print("📌 Сайт отвечает правильно!")
print("🎉 Ты успешно подключился к UPND!")`;
                document.body.textContent = testScript;
                return true;
            }

            return false;
        }

        // === ЗАПУСК ===
        if (!handleApiRequest()) {
            // Показываем интерфейс
        }

        console.log('✅ UPND TEST загружен!');
        console.log('📌 Ссылки создаются с прокси для Roblox');
        console.log('📌 Нажми кнопку для генерации');
    </script>
</body>
</html>
