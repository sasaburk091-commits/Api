<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 Умный дисплей</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: #0d1117;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            width: 100%;
        }
        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
        }
        .card {
            background: #161b22;
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #30363d;
        }
        .text-display {
            background: #0d1117;
            padding: 25px;
            border-radius: 10px;
            min-height: 150px;
            font-size: 22px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
            border-left: 4px solid #58a6ff;
        }
        .empty-text {
            color: #8b949e;
            font-style: italic;
        }
        .timestamp {
            color: #8b949e;
            font-size: 13px;
            text-align: right;
            margin-top: 15px;
        }
        button {
            background: #21262d;
            color: #58a6ff;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover { background: #30363d; }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .status {
            text-align: center;
            color: #8b949e;
            font-size: 14px;
            margin-top: 15px;
        }
        .key-box {
            background: #0d1117;
            padding: 15px;
            border-radius: 10px;
            border: 2px dashed #58a6ff;
            font-size: 20px;
            text-align: center;
            font-family: monospace;
            margin: 15px 0;
            word-break: break-all;
        }
        .flex {
            display: flex;
            gap: 10px;
        }
        .flex button {
            flex: 1;
        }
        .error-box {
            background: #4a1f1f;
            padding: 15px;
            border-radius: 8px;
            color: #f1948a;
            margin-top: 15px;
            display: none;
        }
        .success-box {
            background: #0d4a1f;
            padding: 15px;
            border-radius: 8px;
            color: #58d68d;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📡 Умный дисплей</h1>

        <div class="card">
            <div class="flex" style="margin-bottom: 20px;">
                <button onclick="loadText()">🔄 Обновить</button>
                <button id="genKeyBtn" onclick="generateKey()">🔑 Получить ключ</button>
            </div>

            <div class="text-display" id="textDisplay">
                <span class="empty-text">Загрузка...</span>
            </div>
            <div class="timestamp" id="timestamp"></div>
            <div class="status" id="status"></div>

            <div id="errorBox" class="error-box"></div>
            <div id="successBox" class="success-box"></div>

            <div id="keySection" style="display: none;">
                <div class="key-box" id="keyDisplay"></div>
                <p style="color: #8b949e; font-size: 13px; text-align: center;">
                    💡 Используй этот ключ в Termux
                </p>
            </div>
        </div>
    </div>

    <script>
        // ===== ИСПРАВЛЕННЫЙ ПРОКСИ =====
        const PROXY = 'https://api.allorigins.win/raw?url=';
        const API_URL = 'http://93.115.101.157:14109';
        // =================================

        async function apiRequest(endpoint, method = 'GET', body = null) {
            const url = PROXY + encodeURIComponent(API_URL + endpoint);
            const options = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                },
            };
            if (body) {
                options.body = JSON.stringify(body);
            }
            const response = await fetch(url, options);
            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            return await response.json();
        }

        // === ЗАГРУЗКА ТЕКСТА ===
        async function loadText() {
            const display = document.getElementById('textDisplay');
            const timestamp = document.getElementById('timestamp');
            const status = document.getElementById('status');
            const errorBox = document.getElementById('errorBox');

            try {
                status.textContent = '⏳ Загрузка...';
                errorBox.style.display = 'none';
                
                const data = await apiRequest('/text');
                
                if (data.success) {
                    if (data.content && data.content.trim()) {
                        display.textContent = data.content;
                        display.className = 'text-display';
                    } else {
                        display.innerHTML = '<span class="empty-text">📭 Текст ещё не отправлен</span>';
                    }
                    timestamp.textContent = '🕐 Обновлено: ' + new Date().toLocaleString();
                    status.textContent = '✅ Данные загружены';
                } else {
                    throw new Error(data.error || 'Неизвестная ошибка');
                }
            } catch (error) {
                display.innerHTML = '<span class="empty-text">❌ Не удалось загрузить данные</span>';
                status.textContent = '❌ Ошибка: ' + error.message;
                errorBox.textContent = '❌ ' + error.message;
                errorBox.style.display = 'block';
            }
        }

        // === ГЕНЕРАЦИЯ КЛЮЧА ===
        async function generateKey() {
            const btn = document.getElementById('genKeyBtn');
            const status = document.getElementById('status');
            const keySection = document.getElementById('keySection');
            const keyDisplay = document.getElementById('keyDisplay');
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');

            btn.disabled = true;
            status.textContent = '⏳ Генерация ключа...';
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            try {
                const data = await apiRequest('/generate_key', 'POST');
                
                if (data.success) {
                    keyDisplay.textContent = data.key;
                    keySection.style.display = 'block';
                    status.textContent = '✅ Ключ сгенерирован!';
                    successBox.textContent = '✅ Ключ готов, используй его в Termux.';
                    successBox.style.display = 'block';
                } else {
                    throw new Error(data.error || 'Ошибка генерации');
                }
            } catch (error) {
                status.textContent = '❌ Ошибка: ' + error.message;
                errorBox.textContent = '❌ ' + error.message;
                errorBox.style.display = 'block';
            } finally {
                btn.disabled = false;
            }
        }

        // === АВТОЗАГРУЗКА ===
        loadText();

        // Обновляем текст каждые 15 секунд
        setInterval(() => {
            if (document.visibilityState === 'visible') {
                loadText();
            }
        }, 15000);
    </script>
</body>
</html>
